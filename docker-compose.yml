services:

  node:
    build:
      context: ./node
    container_name: node-service
    ports:
      - "3000:3000"

  python:
    build:
      context: ./python
    container_name: python-service
    ports:
      - "5000:5000"

  java:
    build:
      context: ./java
    container_name: java-service
    ports:
      - "8080:8080"

  go:
    build:
      context: ./go
    container_name: go-service
    ports:
      - "8081:8081"

  php:
    build:
      context: ./php
    container_name: php-service
    ports:
      - "8082:80"
  mysql:
    image: mysql:8.0
    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: polyshop

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: