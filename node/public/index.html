<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PolyShop</title>

    <link rel="stylesheet" href="style.css">

    <script>

        if (!localStorage.getItem("token")) {
            window.location = "/login.html";
        }

    </script>

</head>

<body>

<header>

    <div class="navbar">

        <div class="logo">
            🛒 PolyShop
        </div>

        <div class="search-container">

            <input
                type="text"
                id="search"
                placeholder="Search products...">

        </div>

        <div class="nav-actions">

            <button
                class="profile-btn"
                onclick="openProfile()">

                👤
                <span id="username-display">
                    Profile
                </span>

            </button>

            <button
                class="cart-btn"
                onclick="openCart()">

                🛒 Cart
                (<span id="cart-count">0</span>)

            </button>

        </div>

    </div>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>
            Shop Everything You Need
        </h1>

        <p>
            Electronics • Fashion • Books
        </p>

    </div>

</section>

<section class="categories">

    <button class="category-btn">
        Electronics
    </button>

    <button class="category-btn">
        Fashion
    </button>

    <button class="category-btn">
        Books
    </button>

</section>

<main>

    <div
        class="products"
        id="products">

    </div>

</main>

<div
    id="modal"
    class="modal">

    <div class="modal-content">

        <span
            class="close"
            onclick="closeModal()">

            &times;

        </span>

        <div id="modal-body"></div>

    </div>

</div>

<div
    id="toast"
    class="toast">

</div>

<script src="script.js"></script>

</body>

</html>
