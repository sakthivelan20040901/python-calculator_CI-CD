<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - PolyShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">

    <h1>🛒 PolyShop Login</h1>

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <p>
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </p>

</div>

<script src="login.js"></script>

</body>
</html>
